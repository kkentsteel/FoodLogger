name: FoodLogger
options:
  bundleIdPrefix: com.foodlogger
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  developmentLanguage: en
  knownRegions:
    - en
    - nb

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  FoodLogger:
    type: application
    platform: iOS
    sources:
      - path: FoodLogger
        excludes:
          - "Preview Content/**"
    resources:
      - path: FoodLogger/Resources/Assets.xcassets
      - path: FoodLogger/Resources/norwegian_foods_seed.json
        optional: true
      - path: FoodLogger/Resources/Localizable.xcstrings
        optional: true
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UILaunchStoryboardName: ""
        "INFOPLIST_KEY_UILaunchScreen[UIColorName]": LaunchBackground
        "INFOPLIST_KEY_UILaunchScreen[UIImageName]": LaunchLogo
        "INFOPLIST_KEY_UILaunchScreen[UIImageRespectsSafeAreaInsets]": true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSCameraUsageDescription: "FoodLogger needs camera access to scan barcodes and nutrition labels."
        DEVELOPMENT_ASSET_PATHS: "\"FoodLogger/Preview Content\""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        PRODUCT_BUNDLE_IDENTIFIER: com.foodlogger.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
    dependencies: []

  FoodLoggerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FoodLoggerTests
    dependencies:
      - target: FoodLogger
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/FoodLogger.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/FoodLogger"

  FoodLoggerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FoodLoggerUITests
    dependencies:
      - target: FoodLogger
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true

schemes:
  FoodLogger:
    build:
      targets:
        FoodLogger: all
        FoodLoggerTests: [test]
        FoodLoggerUITests: [test]
    test:
      targets:
        - FoodLoggerTests
        - FoodLoggerUITests
