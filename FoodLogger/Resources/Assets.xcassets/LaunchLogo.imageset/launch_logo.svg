<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Fork and knife icon representing food logging -->
  <circle cx="60" cy="60" r="55" fill="#34B063" opacity="0.15"/>
  <circle cx="60" cy="60" r="45" fill="#34B063" opacity="0.25"/>
  <!-- Fork -->
  <g stroke="#34B063" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="42" y1="30" x2="42" y2="90"/>
    <line x1="36" y1="30" x2="36" y2="50"/>
    <line x1="42" y1="30" x2="42" y2="50"/>
    <line x1="48" y1="30" x2="48" y2="50"/>
    <path d="M36 50 Q42 58 48 50"/>
  </g>
  <!-- Knife -->
  <g stroke="#34B063" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="72" y1="55" x2="72" y2="90"/>
    <path d="M72 30 Q84 40 72 55"/>
  </g>
  <!-- Small chart bars (representing tracking) -->
  <rect x="56" y="78" width="4" height="10" rx="1" fill="#34B063" opacity="0.6"/>
  <rect x="62" y="74" width="4" height="14" rx="1" fill="#34B063" opacity="0.8"/>
  <rect x="68" y="70" width="4" height="18" rx="1" fill="#34B063"/>
</svg>
